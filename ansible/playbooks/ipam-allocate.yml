---
- name: Automated IP Allocation for TechCorp DevOps
  hosts: localhost
  gather_facts: false

  vars:
    portal_url: "{{ lookup('env', 'BLOXONE_CSP_URL') }}"
    portal_key: "{{ lookup('env', 'BLOXONE_API_KEY') }}"

  tasks:
    - name: Get next available IP addresses for new app instances
      infoblox.universal_ddi.ipam_next_available_ip_info:
        portal_url: "{{ portal_url }}"
        portal_key: "{{ portal_key }}"
        id: "{{ app_subnet_id }}"
        count: 3
      register: allocated_ips

    - name: Show what just happened
      debug:
        msg: |
          Universal DDI automatically found these IPs:
          {{ allocated_ips.objects | join(', ') }}
          No spreadsheets. No collisions. No human error.

    - name: Create host records for new servers
      infoblox.universal_ddi.ipam_host:
        portal_url: "{{ portal_url }}"
        portal_key: "{{ portal_key }}"
        name: "inventory-worker-{{ idx + 4 }}.techcorp.example.com"
        addresses:
          - address: "{{ item }}"
            space: "{{ ip_space_id }}"
        state: present
      loop: "{{ allocated_ips.objects }}"
      loop_control:
        index_var: idx

    - name: Get next available SUBNET for a new project
      infoblox.universal_ddi.ipam_next_available_subnet_info:
        portal_url: "{{ portal_url }}"
        portal_key: "{{ portal_key }}"
        id: "{{ address_block_id }}"
        cidr: 24
        count: 1
      register: new_subnet_info

    - name: Create the new subnet in IPAM
      infoblox.universal_ddi.ipam_subnet:
        portal_url: "{{ portal_url }}"
        portal_key: "{{ portal_key }}"
        address: "{{ new_subnet_info.objects[0] }}"
        cidr: 24
        space: "{{ ip_space_id }}"
        name: "new-project-subnet"
        comment: "Auto-provisioned for Project Phoenix"
        state: present
      register: new_subnet

    - name: Display new subnet
      debug:
        msg: "New /24 subnet auto-allocated and created: {{ new_subnet_info.objects[0] }}/24 — check IPAM in the portal!"
