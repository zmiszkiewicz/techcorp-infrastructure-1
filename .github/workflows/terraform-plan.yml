name: Terraform Plan (PR Review)

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

env:
  TF_VAR_environment: dev
  TF_VAR_ddi_api_key: ${{ secrets.BLOXONE_API_KEY }}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.S3_BUCKET_NAME }}"
        working-directory: terraform/environments/${{ env.TF_VAR_environment }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform/

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform/environments/${{ env.TF_VAR_environment }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -lock-timeout=60s -out=tfplan -no-color 2>&1 | tee plan_output.txt
        working-directory: terraform/environments/${{ env.TF_VAR_environment }}
        env:
          BLOXONE_API_KEY: ${{ secrets.BLOXONE_API_KEY }}
          BLOXONE_CSP_URL: ${{ secrets.BLOXONE_CSP_URL }}

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const filePath = 'terraform/environments/${{ env.TF_VAR_environment }}/plan_output.txt';
            let planOutput = 'Plan output not available — the terraform plan step may have failed before producing output.';
            if (fs.existsSync(filePath)) {
              planOutput = fs.readFileSync(filePath, 'utf8');
            }
            const output = `#### Terraform Plan\n\`\`\`\n${planOutput.substring(0, 65000)}\n\`\`\`\n*Pushed by: @${{ github.actor }}, Environment: ${{ env.TF_VAR_environment }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
