name: Terraform Apply (Merge to Main)

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'

env:
  TF_VAR_environment: dev
  TF_VAR_ddi_api_key: ${{ secrets.BLOXONE_API_KEY }}

jobs:
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.S3_BUCKET_NAME }}"
        working-directory: terraform/environments/${{ env.TF_VAR_environment }}

      - name: Terraform Plan
        run: terraform plan -out=tfplan -no-color
        working-directory: terraform/environments/${{ env.TF_VAR_environment }}
        env:
          BLOXONE_API_KEY: ${{ secrets.BLOXONE_API_KEY }}
          BLOXONE_CSP_URL: ${{ secrets.BLOXONE_CSP_URL }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/environments/${{ env.TF_VAR_environment }}
        env:
          BLOXONE_API_KEY: ${{ secrets.BLOXONE_API_KEY }}
          BLOXONE_CSP_URL: ${{ secrets.BLOXONE_CSP_URL }}

      - name: Post Apply Summary
        run: |
          echo "## Terraform Apply Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.TF_VAR_environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
